---
- name: Check IngressRoute CRD is available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: ingressroutes.traefik.io
  register: traefik_ingressroute_crd

- name: Fail when IngressRoute CRD is missing
  ansible.builtin.assert:
    that:
      - traefik_ingressroute_crd.resources | length > 0
    fail_msg: >-
      CRD ingressroutes.traefik.io not found. Run install-traefik.sh first.

- name: Validate headlamp_host is set
  ansible.builtin.assert:
    that:
      - headlamp_host | length > 0
    fail_msg: >-
      headlamp_host is empty. Set HEADLAMP_HOST or ensure inventory has a master public IP.

- name: Configure Headlamp IngressRoute via Traefik
  kubernetes.core.k8s:
    state: present
    template: ingressroute.yaml.j2

- name: Show Headlamp routing summary
  ansible.builtin.debug:
    msg:
      - "Headlamp exposed via Traefik"
      - "URL: http://{{ headlamp_host }}"
      - "Backend: {{ headlamp_service_name }}.{{ headlamp_namespace }}:{{ headlamp_service_port }}"
