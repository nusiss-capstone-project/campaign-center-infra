---
- name: Verify Kafka installation
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  pre_tasks:
    - name: Validate KUBECONFIG is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'KUBECONFIG') | length > 0
        fail_msg: >-
          KUBECONFIG is not set. Run install-kafka.sh or export KUBECONFIG
          to kubeconfigs/<env>.yaml.

  roles:
    - role: kafka
      tasks_from: validate.yml
