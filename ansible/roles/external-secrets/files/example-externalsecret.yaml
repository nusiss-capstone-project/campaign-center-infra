# Example ExternalSecret for GitOps repositories (ArgoCD).
# Syncs MYSQL_DSN from Vault into a Kubernetes Secret consumed by task-mservice.
#
# Prerequisites:
#   - ClusterSecretStore vault-backend is Ready
#   - Secret exists at: secret/data/campaign-center/dev/task-mservice (key: MYSQL_DSN)
#
# Apply in the application namespace (e.g. task-mservice) via ArgoCD.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: task-mservice-secrets
  namespace: task-mservice
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: task-mservice-secrets
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_DSN
      remoteRef:
        key: campaign-center/dev/task-mservice
        property: MYSQL_DSN
