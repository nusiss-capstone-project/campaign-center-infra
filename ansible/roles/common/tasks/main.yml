---
- name: Install base packages for K3s
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - jq
      - iptables
      - iproute2
      - conntrack
      - socat
    state: present
    update_cache: true

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false

- name: Disable swap permanently
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '(?m)^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Load kernel modules for Kubernetes
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - br_netfilter
    - overlay
  changed_when: false
  failed_when: false

- name: Ensure kernel modules load on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    mode: "0644"
    content: |
      br_netfilter
      overlay

- name: Configure Kubernetes sysctl settings
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k3s.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Ensure K3s registry config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
  when: k3s_registry_mirrors_enabled | bool

- name: Configure K3s container registry mirrors
  ansible.builtin.template:
    src: registries.yaml.j2
    dest: /etc/rancher/k3s/registries.yaml
    mode: "0644"
  when: k3s_registry_mirrors_enabled | bool
  notify: Restart K3s for updated registry mirrors
