---
- name: Install cert-manager into K3s cluster
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  pre_tasks:
    - name: Validate KUBECONFIG is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'KUBECONFIG') | length > 0
        fail_msg: >-
          KUBECONFIG is not set. Export KUBECONFIG to kubeconfigs/<env>.yaml.

    - name: Validate kubeconfig file exists
      ansible.builtin.stat:
        path: "{{ lookup('env', 'KUBECONFIG') }}"
      register: kubeconfig_file

    - name: Fail when kubeconfig file is missing
      ansible.builtin.assert:
        that:
          - kubeconfig_file.stat.exists
        fail_msg: >-
          Kubeconfig not found at {{ lookup('env', 'KUBECONFIG') }}.
          Run ./ansible/scripts/install-k3s.sh <env> first.

  roles:
    - cert-manager
