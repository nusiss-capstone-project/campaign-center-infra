---
- name: Check IngressRoute CRD is available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: ingressroutes.traefik.io
  register: traefik_ingressroute_crd

- name: Fail when IngressRoute CRD is missing
  ansible.builtin.assert:
    that:
      - traefik_ingressroute_crd.resources | length > 0
    fail_msg: >-
      CRD ingressroutes.traefik.io not found. Run install-traefik.sh first.

- name: Validate kafka_ui_host is set
  ansible.builtin.assert:
    that:
      - kafka_ui_host | length > 0
    fail_msg: >-
      kafka_ui_host is empty. Set KAFKA_UI_HOST or ensure inventory has a master public IP.

- name: Configure Kafka UI IngressRoute via Traefik
  kubernetes.core.k8s:
    state: present
    template: ingressroute.yaml.j2

- name: Show Kafka UI routing summary
  ansible.builtin.debug:
    msg:
      - "Kafka UI exposed via Traefik"
      - "URL: http://{{ kafka_ui_host }}"
      - "Backend: {{ kafka_ui_service_name }}.{{ kafka_ui_namespace }}:{{ kafka_ui_service_port }}"
      - "Kafka bootstrap: {{ kafka_ui_bootstrap_servers }}"
